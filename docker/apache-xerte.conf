# Apache vhost for Xerte Online Toolkits inside the Docker container.
# Serves the application from /var/www/xerte at the web root.

<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/xerte

    <Directory /var/www/xerte>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Reasonable defaults for uploaded learning objects / media.
    LimitRequestBody 0

    ErrorLog ${APACHE_LOG_DIR}/xerte_error.log
    CustomLog ${APACHE_LOG_DIR}/xerte_access.log combined
</VirtualHost>
